services:
  app:
    build: .
    container_name: bookiedookie_app
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=contractordb;Username=postgres;Password=1212

  db:
    image: postgres:15
    container_name: contractordb
    restart: always
    environment:
      POSTGRES_DB: contractordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1212
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: